<div class="cp">
  <header class="cp__head">
    <span class="cp__avatar">
      <ion-icon name="lock-closed-outline"></ion-icon>
    </span>
    <div>
      <h3 class="cp__title vk-title">Trocar senha</h3>
      <p class="cp__sub">Defina uma nova senha de acesso.</p>
    </div>
  </header>

  <form [formGroup]="form" (ngSubmit)="salvar()">
    <label class="cp__label" for="cp-atual">Senha atual</label>
    <input
      id="cp-atual"
      class="cp__input"
      type="password"
      formControlName="senhaAtual"
      [class.cp__input--error]="invalido('senhaAtual')"
    />
    @if (invalido('senhaAtual')) {
      <span class="cp__error">Informe sua senha atual.</span>
    }

    <label class="cp__label" for="cp-nova">Nova senha</label>
    <input
      id="cp-nova"
      class="cp__input"
      type="password"
      formControlName="novaSenha"
      [class.cp__input--error]="invalido('novaSenha')"
    />
    @if (invalido('novaSenha')) {
      <span class="cp__error">A nova senha deve ter ao menos 6 caracteres.</span>
    }

    <label class="cp__label" for="cp-confirmar">Confirmar nova senha</label>
    <input
      id="cp-confirmar"
      class="cp__input"
      type="password"
      formControlName="confirmar"
      [class.cp__input--error]="divergem"
    />
    @if (divergem) {
      <span class="cp__error">As senhas não coincidem.</span>
    }

    <div class="cp__foot">
      <button type="button" class="cp__btn cp__btn--ghost" (click)="fechar()">Cancelar</button>
      <button type="submit" class="cp__btn cp__btn--primary" [disabled]="loading()">
        Alterar senha
      </button>
    </div>
  </form>
</div>
